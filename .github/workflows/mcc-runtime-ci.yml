name: MCC Runtime CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Egress proxy end-to-end smoke (ALLOW / CONSTRAIN / DENY / ESCALATE)
        run: |
          # Boots upstream + gateway + egress proxy on loopback and drives the
          # full scenario through the proxy. The script asserts ALLOW passes,
          # CONSTRAIN rewrites the body to the mandate cap, and DENY/ESCALATE
          # are blocked before reaching upstream — exiting non-zero on any miss.
          python examples/egress_proxy_demo.py

      - name: Transaction governance end-to-end smoke (idempotency + velocity)
        run: |
          # Boots upstream + gateway + coordinator-backed egress proxy and drives
          # the full a-h ordering: a payment executes once, a duplicate
          # idempotency key never executes again, and four valid payments cannot
          # bypass the cumulative velocity ceiling. Exits non-zero on any miss.
          python examples/transaction_governance_demo.py

      - name: Governance HTTP end-to-end smoke (mandates + approvals)
        run: |
          # Boots the real gateway (with a pilot trust config) + upstream and
          # drives mandate verify/execute/revoke and the ESCALATE approve→execute
          # single-use flow over HTTP. Asserts no blocked decision reaches the
          # upstream (no bypass). Exits non-zero on any miss.
          python examples/governance_http_demo.py

  consensus-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Reproducible consensus 3-of-3 evidence (regeneration + scenarios)
        run: |
          # Regenerates the evidence in a temp dir and fails on any drift from
          # the committed artifacts (proves reproducibility) and on any scenario
          # that does not fail closed.
          python evidence/consensus_3of3/harness.py --check

      - name: Independent re-verification (no mcc_core)
        run: |
          # Re-checks MANIFEST integrity and independently re-derives every
          # consensus verdict using only cryptography + stdlib.
          python evidence/consensus_3of3/verify_independent.py

  consensus-enforcement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Mandatory consensus 3-of-3 enforced in the execution path
        run: |
          # The coordinator runs with require_consensus=True: no governed action
          # actuates without a valid 3-of-3 bound to the token's
          # action/actor/payload/resource/policy_hash/nonce. Proves a valid 3-of-3
          # reaches the downstream once and every invalid or incomplete case
          # (missing, <3, veto, duplicate, untrusted, bad-sig, expired,
          # action/actor/resource/payload/nonce/policy mismatch, replay) is denied
          # and never forwarded — at the coordinator, over HTTP, and in the builder.
          pytest tests/test_consensus_enforcement.py \
                 tests/test_consensus_enforcement_http.py \
                 tests/test_consensus_builder.py -v

  consensus-challenge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Consensus challenge / nonce handshake (gateway issues the nonce)
        run: |
          # The gateway mints the one-time nonce inside a single-use, TTL-bounded
          # challenge bound to the exact operation; clients never generate it.
          # Proves: a valid challenge-backed 3-of-3 reaches the downstream once;
          # reused/expired/unknown challenges and every binding mismatch (nonce,
          # action, actor, resource, payload, policy) are denied and never
          # forwarded; a client-supplied nonce without a challenge cannot
          # actuate. Covers the service, coordinator, and multi-instance store.
          pytest tests/test_challenge.py \
                 tests/test_challenge_coordinator.py \
                 tests/test_challenge_http.py \
                 tests/test_challenge_redis.py -v

  nonce-redis-smoke:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cross-instance replay protection against a real Redis
        env:
          MCC_REDIS_URL: redis://127.0.0.1:6379/0
        run: |
          # Two independent gate instances share one Redis; a token verified on
          # one must be rejected when replayed on the other. Exits non-zero on
          # any miss.
          python scripts/redis_nonce_smoke.py

      - name: Cross-instance idempotency + aggregate ceiling against a real Redis
        env:
          MCC_REDIS_URL: redis://127.0.0.1:6379/0
        run: |
          # An operation executed on one instance cannot execute again on
          # another, and a cumulative velocity ceiling holds across separately-
          # signed transactions and instances. Exits non-zero on any miss.
          python scripts/redis_governance_smoke.py

      - name: Cross-instance mandate revocation against a real Redis
        env:
          MCC_REDIS_URL: redis://127.0.0.1:6379/0
        run: |
          # A mandate revoked through a shared Redis revocation list on one
          # instance must verify as REVOKED on another. Exits non-zero on miss.
          python scripts/redis_mandate_smoke.py

      - name: Cross-instance single-use approval consume against a real Redis
        env:
          MCC_REDIS_URL: redis://127.0.0.1:6379/0
        run: |
          # An approved request can be consumed exactly once even when two
          # instances race to consume it. Exits non-zero on any miss.
          python scripts/redis_approval_smoke.py

      - name: Cross-instance single-use consensus challenge against a real Redis
        env:
          MCC_REDIS_URL: redis://127.0.0.1:6379/0
        run: |
          # A challenge issued on one instance is visible on another and can be
          # consumed exactly once even when two instances race. Exits non-zero
          # on any miss.
          python scripts/redis_challenge_smoke.py

      - name: Governance HTTP layer cross-instance against a real Redis
        env:
          MCC_REDIS_URL: redis://127.0.0.1:6379/0
        run: |
          # Two GovernanceService instances share one Redis; a mandate revoked on
          # one is blocked on the other, and an approval consumed on one cannot be
          # replayed on the other — through the full coordinator+gate path.
          python scripts/redis_governance_http_smoke.py

      - name: Hardened shared Redis governance state against a real Redis
        env:
          MCC_REDIS_URL: redis://127.0.0.1:6379/0
        run: |
          # Canonical namespaced keys; nonce single-use cross-instance; idempotency
          # conflict + single concurrent winner; velocity aggregate enforced across
          # instances with the ATOMIC LUA reserve under real concurrency; negative
          # amount rejected. Proves the Lua actually runs in Redis. Exits non-zero
          # on any miss.
          python scripts/redis_runtime_smoke.py

  invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No HMAC in authority-bearing runtime path
        run: |
          if grep -rin "hmac" main.py src/; then
            echo "STOP: HMAC found in authority-bearing runtime path"
            exit 1
          fi
          echo "OK: no HMAC in main.py or src/"

      - name: No legacy mcc-prior-auth string in runtime path
        run: |
          if grep -rn "mcc-prior-auth" main.py src/ tests/ scripts/; then
            echo "STOP: legacy repo-name typo found"
            exit 1
          fi
          echo "OK: no mcc-prior-auth string"

      - name: Fail-closed references present
        run: |
          grep -qi "fail-closed" main.py
          grep -qi "fail-closed" src/mcc_core/gate.py
          grep -qi "fail" src/mcc_core/nonce.py
          echo "OK: fail-closed posture referenced in runtime and gate"

      - name: Audit fsync path present
        run: |
          grep -q "fsync" src/mcc_core/audit.py
          echo "OK: fsync present in audit log"

      - name: Runtime version drift-guard (canonical VERSION = 1.11.0)
        run: |
          # Every product/runtime entrypoint must derive its version from the
          # single canonical VERSION file (no hardcoded literal). Fails on drift.
          # Frozen historical (v1.10.1), schema, doctrine, and README strings are
          # intentionally NOT inspected.
          python scripts/check_version_drift.py
          # Negative control: a deliberate hardcoded runtime literal must be caught.
          cp gateway/app.py /tmp/app.bak
          sed -i 's/version=RUNTIME_VERSION,/version="9.9.9-drift",/' gateway/app.py
          if python scripts/check_version_drift.py; then
            echo "STOP: drift-guard failed to catch a hardcoded runtime version"; cp /tmp/app.bak gateway/app.py; exit 1
          fi
          cp /tmp/app.bak gateway/app.py
          python scripts/check_version_drift.py
          echo "OK: drift-guard catches runtime drift and passes when canonical"

      - name: Frozen historical version untouched (v1.10.1)
        run: |
          # v1.10.1 is frozen historical/exhibit evidence. The runtime
          # reconciliation must never rewrite it. Confirm it is still present.
          grep -q "v1.10.1" CLAUDE.md && echo "OK: v1.10.1 frozen reference intact" \
            || { echo "STOP: frozen v1.10.1 reference was modified"; exit 1; }

      - name: No fail-open exception handlers in gate
        run: |
          if grep -rn "except.*ALLOW\|except.*allow" src/mcc_core/gate.py main.py; then
            echo "STOP: fail-open pattern detected"
            exit 1
          fi
          echo "OK: no fail-open handlers"

      - name: YAML policy thresholds match Rego canon
        run: |
          rego=$(grep -oE 'amount (<=|>) [0-9]+' policies/mcc.rego | grep -oE '[0-9]+' | sort -un)
          if [ -z "$rego" ]; then
            echo "STOP: no thresholds found in policies/mcc.rego"
            exit 1
          fi
          for f in mcc.yaml policies.yaml; do
            yaml=$(grep -oE 'amount (<=|>) [0-9]+' "$f" | grep -oE '[0-9]+' | sort -un)
            if [ "$rego" != "$yaml" ]; then
              echo "STOP: $f thresholds do not match rego canon"
              echo "rego: $rego"
              echo "$f: $yaml"
              exit 1
            fi
          done
          echo "OK: mcc.yaml and policies.yaml match rego canon thresholds:"
          echo "$rego"
