version: "1.0"

mcc:
  name: mcc-layer
  mode: fail-closed

actions:
  send_payment:
    description: "Control policy for payment execution"
    rules:
      allow:
        condition: "amount <= 5000"
        reason: "Within autonomous approval threshold"
      escalate:
        condition: "amount > 5000 and amount <= 10000"
        reason: "Human approval required"
      deny:
        condition: "amount > 10000"
        reason: "High-risk payment blocked"

audit:
  enabled: true
  hash_chain: true

rollback:
  enabled: true

default:
  decision: DENY
  reason: "No explicit execution authority"
